<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
</head>

<body>
	<h3>Employee Directory</h3>
	<hr>

	<table>
		<tr>
			<th>First Name</th>
			<th>Last Name</th>
			<th>Email</th>
			<th>Salary</th>
		</tr>
		<tr th:each="temp :${employees}">
			<td th:text=${temp.firstName}></td>
			<td th:text=${temp.lastName}></td>
			<td th:text=${temp.email}></td>
			<td th:text=${temp.salary}></td>
		</tr>
